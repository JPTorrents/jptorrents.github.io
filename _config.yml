title: Joël Perez-Torrents
email: joel.perez-torrents@polytechnique.edu
description: >-
  Academic website of Joël Perez-Torrents: research themes, publications,
  talks, and CV.
baseurl: ""
url: "https://jptorrents.github.io"
github_username: JPTorrents
lang: en

author:
  name: Joël Perez-Torrents
  given_name: Joël
  family_name: Perez-Torrents
  job_title: Postdoctoral Researcher
  affiliation: Desautels Faculty of Management, McGill University
  locality: Montréal, Canada
  email: joel.perez-torrents@polytechnique.edu
  same_as:
    - https://orcid.org/0009-0008-5860-1948
    - https://scholar.google.com/citations?user=a-3uzfgAAAAJ&hl=en
    - https://github.com/JPTorrents

markdown: kramdown
theme: null
plugins:
  - jekyll-feed

sass:
  style: compressed
  sass_dir: _sass

include:
  - _pages

collections:
  publications:
    output: true
    permalink: /publications/:name/

defaults:
  -
    scope:
      type: posts
      path: _posts
    values:
      is_post: true
      layout: post
      permalink: /blog/:categories/:title/
  -
    scope:
      type: pages
      path: _pages
    values:
      is_post: false
      layout: default
  -
    scope:
      type: publications
      path: _publications
    values:
      layout: publication
