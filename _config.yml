title: Joel Perez-Torrents
email: jpereztorrents+github@gmail.com
description: >-
  Personal academic website of Joel Perez-Torrents: research themes,
  publications, and academic profile.
baseurl: ""
url: "https://jptorrents.github.io"
github_username: JPTorrents
lang: en

author:
  name: Joel Perez-Torrents
  given_name: Joel
  family_name: Perez-Torrents
  job_title: Researcher
  affiliation: Independent / Academic Collaborations
  email: jpereztorrents+github@gmail.com
  same_as:
    - https://orcid.org/0009-0008-5860-1948
    - https://scholar.google.com/citations?user=a-3uzfgAAAAJ&hl=en
    - https://github.com/JPTorrents
    - https://jptorrents.substack.com

markdown: kramdown
theme: null
plugins:
  - jekyll-feed

sass:
  style: compressed
  sass_dir: _sass

include:
  - _pages

collections:
  publications:
    output: true
    permalink: /publications/:name/

defaults:
  -
    scope:
      type: posts
      path: _posts
    values:
      is_post: true
      layout: post
      permalink: /blog/:categories/:title/
  -
    scope:
      type: pages
      path: _pages
    values:
      is_post: false
      layout: default
  -
    scope:
      type: publications
      path: _publications
    values:
      layout: publication


readme_index:
  enabled: false
  remove_originals: true
