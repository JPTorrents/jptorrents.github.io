  type: "PhD thesis dissertation"
  location: "France"

- slug: la-gestion-de-lactivite-de-prise-en-charge-des-patients-peut-elle-devenir-visible-2024
  title: "La gestion de l’activité de prise en charge des patients peut-elle devenir visible ?"
  authors:
    - Aurore Fierobe
    - Philippe Lorino
    - Etienne Minvielle
    - Joel Perez-Torrents
  year: 2024
  venue: "Revue française de gestion"
  doi: "https://doi.org/10.1684/rfg.2024.42"
  abstract: "Malgré les ressources injectées dans le système, le malaise des professions de santé persiste. L’hypothèse avancée est qu’une grande partie des problèmes se situe au niveau de l’activité réelle. À partir d’une analyse sur le fardeau administratif, les hiérarchies hospitalières, et la coordination du parcours du patient, et en s’inspirant de la pensée pragmatiste, un diagnostic d’ensemble ressort : menée par des professionnels qui agissent sur le terrain, des solutions adaptées se bâtissent, mais restent assez invisibles, car éloignées de la mise en place des réformes officielles."
  keywords:
    - Philosophie de la santé
    - Sciences infirmières
  methods: ""
  data: ""
  volume: 318
  issue: 5
  pages: "131-150"

- slug: usages-des-outils-dintelligence-artificielle-et-capacite-dagir-des-radiologues-2023
  title: "Comment les usages des outils d’Intelligence Artificielle augmentent-ils la capacité d’agir des radiologues ?"
  authors:
    - Joel Perez-Torrents
    - Etienne Minvielle
  year: 2023
  venue: "Journal de Gestion et d’Économie de la Santé"
  doi: "https://doi.org/10.54695/jdds.041.3.0185"
  abstract: "Les usages croissants des outils d’Intelligence Artificielle (IA) dans le domaine médical, notamment en radiologie, soulèvent des questions cruciales sur l’augmentation des capacités des professionnels hautement qualifiés. Notre étude se concentre sur deux cadres théoriques : les « pratiques interrogatives » et le cadre conformation/exploration. À partir de 81 heures d’observations (par la méthode du shadowing) et de 9 entretiens menés dans deux établissements de santé faisant usage de l’outil d’IA pour le diagnostic des mammographies, nous découvrons que la collaboration entre les radiologues et l’outil d’IA renforce principalement leurs capacités existantes (conformation) plutôt qu’à en développer de nouvelles (exploration). Ces résultats suggèrent la nécessité d’un dialogue approfondi entre les concepteurs d’outils d’IA et les experts métier pour promouvoir des pratiques interrogatives orientées vers l’exploration, permettant ainsi d’accroître les capacités professionnelles."
  keywords:
    - Artificial intelligence
    - Radiology
    - Capacity to act
    - Healthcare work
    - Technology use
  methods: ""
  data: ""
  pages: "185-203"
