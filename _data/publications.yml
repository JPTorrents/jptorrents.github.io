- slug: gerer-la-collaboration-entre-lexpert-metier-et-lintelligence-artificielle-2024
  title: "Gérer la collaboration entre l’expert métier et l’Intelligence Artificielle : Deux études de cas dans le système de soins"
  authors:
    - Joel Perez-Torrents
  year: 2024
  venue: "Institut Polytechnique de Paris"
  doi: "https://theses.hal.science/tel-04780193/"
  abstract: "L’Intelligence Artificielle (IA) mobilise des méthodes d’apprentissage machine pour automatiser la création de modèles statistiques complexes. Ces outils d’IA peuvent accomplir des tâches avec des performances similaires à celles des experts, mais la manière dont les résultats sont produits reste souvent opaque, posant des défis pour leur intégration dans les organisations. Cette thèse explore la collaboration entre les experts métier et les outils d’IA dans le contexte du système de soins.Dans le système de soins, cette collaboration est cruciale en raison de la responsabilité professionnelle et morale des décisions médicales et de leur incertitude inhérente. Si les outils d’IA promettent de répondre aux tensions de ce système en offrant une personnalisation accrue des soins à moindre coût, ils suscitent également des craintes et leur adoption reste à concrétiser. Notre démarche empirique produit deux études de cas illustrant ces dynamiques. RADO porte sur les usages d’un outil d’IA par des radiologues pour l’analyse mammographique, visant à améliorer leur activité. La seconde étude de cas, KOVAK, examine comment une équipe de recherche médicale utilise des outils d’IA pour analyser des données de cohortes de patients.Nous utilisons un premier cadre d’analyse pour observer comment les experts intègrent leurs connaissances avec les résultats de l’outil d’IA, démontrant ainsi un engagement dans la collaboration. Un deuxième cadre caractérise une double nature de l’usage de l’outil d’IA, entre optimisation d’une activité et apprentissages, et montre l’augmentation des capacités des radiologues grâce à cette collaboration Un troisième cadre, fondé sur les travaux de Peirce sur l’enquête pragmatiste, considère l’outil d’IA comme un partenaire dans la construction des connaissances.Nous proposons un modèle de collaboration, l’EMC2 (Expert Machine Collaborative Community). Il intègre différents modes de gestion de la collaboration expert-IA facilitant ainsi une meilleure intégration de cette collaboration au sein des organisations.Cette thèse contribue à la littérature sur les modèles de collaboration humain-IA par des modes de gestion issus d’une démarche empirique. Elle enrichit aussi la littérature sur les usages des outils d’IA en spécifiant des pratiques interrogatives et en appliquant le concept d’enquête pragmatiste."
  keywords:
    - Système de soins 
    - Expert métier
    - Intelligence Artificielle
    - Humain-IA Collaboration
  methods: ""
