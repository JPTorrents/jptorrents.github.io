- slug: a-time-for-monsters-organizational-knowing-after-llms-2026
  title: "A Time For Monsters: Organizational Knowing After LLMs"
  authors:
    - Samer Faraj
    - Joel Perez-Torrents
    - Saku Mantere
    - Anand Bhardwaj
  year: 2026
  venue: "Strategic Organization"
  doi: "https://doi.org/10.1177/14761270251410675"
  abstract: "Large language models are reshaping organizational knowing by unsettling the epistemological foundations of representational and practice-based perspectives. We conceptualize large language models as Haraway-ian monsters, that is, hybrid, boundary-crossing entities that destabilize established categories while opening new possibilities for inquiry. Focusing on analogizing as a fundamental driver of knowledge, we examine how large language models generate connections through large-scale statistical inference. Analyzing their operation across the dimensions of surface/deep analogies and near/far domains, we highlight both their capacity to expand organizational knowing and the epistemic risks they introduce. Building on this, we identify three challenges of living with such epistemic monsters: the transformation of inquiry, the growing need for dialogical vetting, and the redistribution of agency. By foregrounding the entangled dynamics of knowing-with-large language models, the article extends organizational theory beyond human-centered epistemologies and invites renewed attention to how knowledge is created, validated, and acted upon in the age of intelligent technologies."
  keywords:
    - Large language models
    - Organizational knowing
    - Knowledge production
    - Strategy
    - Organizations
  methods: ""
  data: ""

- slug: remote-monitoring-system-for-older-adults-at-risk-2025
  title: "Remote Monitoring System for Older Adults at Risk for Complications: A Scoping Review"
  authors:
    - Salma Israa
    - Testa Damien
    - Mpoy Jacky-Vivien
    - Perez-Torrents Joel
    - Rehault Jean-Malo
    - Cabanes Elise
    - Minvielle Etienne
  year: 2025
  venue: "BMC Geriatrics"
  doi: "https://doi.org/10.1186/s12877-025-06385-8"
  abstract: "Aging populations and the increasing incidence of chronic diseases are placing additional pressure on healthcare systems. Remote monitoring systems (RMS) have emerged as a solution for improving remote healthcare efficiency and monitoring complex elderly patients. However, telemonitoring services in elderly care are still in their infancy, and their effectiveness remains unproven, with the potential for context-dependent variability. To bridge this gap, we conducted a scoping review to understand the current state of RMSs for elderly individuals at risk for complications, and their potential impact on healthcare service use, elderly’s quality of life, and cost-effectiveness. Following the PRISMA-ScR guidelines, data were gathered from PubMed, Scopus, and Google Scholar databases using predefined keywords, from 2010 onwards. Only English peer-reviewed studies that met the eligibility criteria were retained. A total of 1,576 articles were initially identified. After removing duplicates and screening titles and abstracts, 47 articles were eligible for full-text assessment. Of these, 18 articles were included in the final analysis. Multiple RMSs have been identified and used for elderly patients with complex chronic conditions and a high risk of complications. Such systems typically involve telemonitoring devices, integrated or not with health questionnaires, supported by an automated alert system led by a healthcare professional, usually a nurse, who collaborates with different healthcare structures. The evaluation of RMSs effectiveness was primarily based on health service utilization—particularly hospitalization, emergency room visits and length of hospital stay—followed by quality of life and cost-effectiveness. Our findings support the promising impact of RMSs on reducing hospitalization for at-risk elderly individuals, especially the unplanned hospitalization, improving quality of life, and its cost-effectiveness. This review outlines multiple RMSs used for elderly individuals at risk for complications. Although the effectiveness of RMSs may depend on the content and level of responsiveness, our review underscores the necessity for further empirical research into telemonitoring interventions to fully understand their impact on elderly health outcomes and healthcare systems resources."
  keywords:
    - Remote monitoring systems
    - At-risk elderly individuals
    - Chronic conditions
    - Hospitalization
    - Quality of life
    - Cost-effectiveness
  methods: "Following the PRISMA-ScR guidelines, data were gathered from PubMed, Scopus, and Google Scholar databases using predefined keywords, from 2010 onwards. Only English peer-reviewed studies that met the eligibility criteria were retained"
  data: "A total of 1,576 articles were initially identified. After removing duplicates and screening titles and abstracts, 47 articles were eligible for full-text assessment. Of these, 18 articles were included in the final analysis. Multiple RMSs have been identified and used for elderly patients with complex chronic conditions and a high risk of complications. Such systems typically involve telemonitoring devices, integrated or not with health questionnaires, supported by an automated alert system led by a healthcare professional, usually a nurse, who collaborates with different healthcare structures. The evaluation of RMSs effectiveness was primarily based on health service utilization—particularly hospitalization, emergency room visits and length of hospital stay—followed by quality of life and cost-effectiveness. Our findings support the promising impact of RMSs on reducing hospitalization for at-risk elderly individuals, especially the unplanned hospitalization, improving quality of life, and its cost-effectiveness."
