- slug: remote-monitoring-system-for-older-adults-at-risk-2025
  title: "Remote Monitoring System for Older Adults at Risk for Complications: A Scoping Review"
  authors:
    - Salma Israa
    - Testa Damien
    - Mpoy Jacky-Vivien
    - Perez-Torrents Joel
    - Rehault Jean-Malo
    - Cabanes Elise
    - Minvielle Etienne
  year: 2025
  venue: "BMC Geriatrics"
  doi: "https://doi.org/10.1186/s12877-025-06385-8"
  abstract: "This scoping review maps remote monitoring systems for older adults at risk of complications and assesses their effects on hospitalization, quality of life, and costs. The findings suggest promising benefits, especially in reducing unplanned hospitalizations."
  keywords:
    - Remote monitoring systems
    - At-risk elderly individuals
    - Chronic conditions
    - Hospitalization
    - Quality of life
    - Cost-effectiveness
  methods: "Following the PRISMA-ScR guidelines, data were gathered from PubMed, Scopus, and Google Scholar databases using predefined keywords, from 2010 onwards. Only English peer-reviewed studies that met the eligibility criteria were retained"
  data: "A total of 1,576 articles were initially identified. After removing duplicates and screening titles and abstracts, 47 articles were eligible for full-text assessment. Of these, 18 articles were included in the final analysis. Multiple RMSs have been identified and used for elderly patients with complex chronic conditions and a high risk of complications. Such systems typically involve telemonitoring devices, integrated or not with health questionnaires, supported by an automated alert system led by a healthcare professional, usually a nurse, who collaborates with different healthcare structures. The evaluation of RMSs effectiveness was primarily based on health service utilization—particularly hospitalization, emergency room visits and length of hospital stay—followed by quality of life and cost-effectiveness. Our findings support the promising impact of RMSs on reducing hospitalization for at-risk elderly individuals, especially the unplanned hospitalization, improving quality of life, and its cost-effectiveness."
  volume: 25
  article_number: 766

- slug: nurse-navigators-digital-remote-monitoring-cancer-care-2025
  title: "The Effect of Nurse Navigators in Digital Remote Monitoring in Cancer Care: Case Study Using Structural Equation Modeling"
  authors:
    - Etienne Minvielle
    - Joel Perez-Torrents
    - Salma Israa
    - Philippe Aegerter
    - Marie Ferrua
    - Charles Ferté
    - Henri Leleu
    - Delphine Mathivon
    - Claude Sicotte
    - Mario Di Palma
    - Florian Scotté
  year: 2025
  venue: "Journal of Medical Internet Research"
  doi: "https://www.jmir.org/2025/1/e66275"
  abstract: "This study examines how nurse navigators shape the effectiveness of digital remote monitoring in cancer care. Using data from the CAPRI program, it shows that their interventions are central to patient satisfaction, care coordination, and clinical outcomes, supporting hybrid models that combine digital tools with human expertise."
  keywords:
    - Nurse navigators
    - Digital remote monitoring
    - Cancer care
    - Structural equation modeling
    - Case study
  methods: "he CAPRI DRM, targeting patients taking oral anticancer agents, combines digital interfaces with NN interventions. A phase 3 randomized controlled trial involving 559 patients assessed its safety and efficacy, with the primary end point being the relative dose intensity. This report focuses on patients in the CAPRI arm, evaluating the impact of NN interventions on outcomes such as toxicity, hospitalization, and emergency visits. Data on patient characteristics, NN interventions, and patient satisfaction surveys were analyzed using structural equation modeling."
  data: "The study included 187 patients. Patient characteristics were significantly correlated with outcomes. Across all the models we used, the quality of NN interventions was consistently associated with higher patient satisfaction, with correlation coefficients ranging from 0.332 (95% CI 0.154-0.510; P<.001) to 0.366 (95% CI 0.182-0.550; P<.001). The number of grade ≥3 toxicity events correlated positively with NN referrals to oncologists. Hospitalization length was positively related to NN referral (coefficient 0.102, 95% CI 0.051-0.153; P<.001) and inversely to NN advice (coefficient –0.045, 95% CI –0.096 to 0.006; P=.08). Emergency visits showed a negative correlation with NN actions (coefficient –0.478, 95% CI –0.923 to 0.033; P=.04) and a positive correlation with NN calls and referrals (coefficient 0.516, 95% CI 0.069-0.963; P=.02)."
  volume: 27
  article_number: "e66275"

- slug: gerer-la-collaboration-entre-lexpert-metier-et-lintelligence-artificielle-2024
  title: "Gérer la collaboration entre l’expert métier et l’Intelligence Artificielle : Deux études de cas dans le système de soins"
  authors:
    - Joel Perez-Torrents
  year: 2024
  venue: "Institut Polytechnique de Paris"
  doi: "https://theses.hal.science/tel-04780193/"
  abstract: "Cette thèse analyse comment des experts métier collaborent concrètement avec des outils d’IA dans le système de soins. À partir de deux études de cas, elle montre que l’IA n’automatise pas simplement l’expertise : elle reconfigure l’enquête, l’apprentissage et l’action collective au sein des organisations."
