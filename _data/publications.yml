- slug: nurse-navigators-digital-remote-monitoring-cancer-care-2025
  title: "The Effect of Nurse Navigators in Digital Remote Monitoring in Cancer Care: Case Study Using Structural Equation Modeling"
  authors:
    - Etienne Minvielle
    - Joel Perez-Torrents
    - Salma Israa
    - Philippe Aegerter
    - Marie Ferrua
    - Charles Ferté
    - Henri Leleu
    - Delphine Mathivon
    - Claude Sicotte
    - Mario Di Palma
    - Florian Scotté
  year: 2025
  venue: "Journal of Medical Internet Research"
  doi: "https://www.jmir.org/2025/1/e66275"
  abstract: "The purpose of digital remote monitoring (DRM) is improving cancer care management. However, its effectiveness largely depends on the role of nurse navigators (NNs) within these systems to process data and lead action. This study aims to fill gaps in our understanding of the role of NNs within a specific system, drawing on the Cancérologie parcours région Ile-de-France (CAPRI) DRM program applied to oncology patients. The CAPRI DRM, targeting patients taking oral anticancer agents, combines digital interfaces with NN interventions. A phase 3 randomized controlled trial involving 559 patients assessed its safety and efficacy, with the primary end point being the relative dose intensity. This report focuses on patients in the CAPRI arm, evaluating the impact of NN interventions on outcomes such as toxicity, hospitalization, and emergency visits. Data on patient characteristics, NN interventions, and patient satisfaction surveys were analyzed using structural equation modeling. The study included 187 patients. Patient characteristics were significantly correlated with outcomes. Across all the models we used, the quality of NN interventions was consistently associated with higher patient satisfaction, with correlation coefficients ranging from 0.332 (95% CI 0.154-0.510; P<.001) to 0.366 (95% CI 0.182-0.550; P<.001). The number of grade ≥3 toxicity events correlated positively with NN referrals to oncologists. Hospitalization length was positively related to NN referral (coefficient 0.102, 95% CI 0.051-0.153; P<.001) and inversely to NN advice (coefficient –0.045, 95% CI –0.096 to 0.006; P=.08). Emergency visits showed a negative correlation with NN actions (coefficient –0.478, 95% CI –0.923 to 0.033; P=.04) and a positive correlation with NN calls and referrals (coefficient 0.516, 95% CI 0.069-0.963; P=.02). This study shows the central role of NNs in making DRM effective. Despite the study’s limitations, these results support the design of DRM as a hybrid model of automated digital tools and human support. Future research should explore the applicability of such a DRM model in various clinical settings to clarify the optimal association between automated systems and NN expertise."
  keywords:
    - Nurse navigators
    - Digital remote monitoring
    - Cancer care
    - Structural equation modeling
    - Case study
  methods: "he CAPRI DRM, targeting patients taking oral anticancer agents, combines digital interfaces with NN interventions. A phase 3 randomized controlled trial involving 559 patients assessed its safety and efficacy, with the primary end point being the relative dose intensity. This report focuses on patients in the CAPRI arm, evaluating the impact of NN interventions on outcomes such as toxicity, hospitalization, and emergency visits. Data on patient characteristics, NN interventions, and patient satisfaction surveys were analyzed using structural equation modeling."
  data: "The study included 187 patients. Patient characteristics were significantly correlated with outcomes. Across all the models we used, the quality of NN interventions was consistently associated with higher patient satisfaction, with correlation coefficients ranging from 0.332 (95% CI 0.154-0.510; P<.001) to 0.366 (95% CI 0.182-0.550; P<.001). The number of grade ≥3 toxicity events correlated positively with NN referrals to oncologists. Hospitalization length was positively related to NN referral (coefficient 0.102, 95% CI 0.051-0.153; P<.001) and inversely to NN advice (coefficient –0.045, 95% CI –0.096 to 0.006; P=.08). Emergency visits showed a negative correlation with NN actions (coefficient –0.478, 95% CI –0.923 to 0.033; P=.04) and a positive correlation with NN calls and referrals (coefficient 0.516, 95% CI 0.069-0.963; P=.02)."
