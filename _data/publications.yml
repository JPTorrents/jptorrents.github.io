  abstract: "Large language models are changing how organizations know, compare, and act. Framing them as boundary-crossing 'monsters' Haraway-ian sense, that is, hybrid, boundary-crossing entities that destabilize established categories while opening new possibilities, we understand their working principles as 'analogy engies' through large-scale statistical inference, which change organizational knowing."
