{% if page.collection == "publications" %}
<meta name="citation_title" content="{{ page.title | escape }}">
{% for a in page.authors %}<meta name="citation_author" content="{{ a | escape }}">{% endfor %}
{% if page.year %}<meta name="citation_publication_date" content="{{ page.year }}">{% endif %}
{% if page.venue %}<meta name="citation_journal_title" content="{{ page.venue | escape }}">{% endif %}
{% if page.doi %}<meta name="citation_doi" content="{{ page.doi | escape }}">{% endif %}
{% if page.pdf_url %}<meta name="citation_pdf_url" content="{{ page.pdf_url }}">{% endif %}
<link rel="canonical" href="{{ page.url | absolute_url }}">
{% endif %}
