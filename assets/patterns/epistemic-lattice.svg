<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <style>
      .edge { stroke:#9EC8FF; stroke-opacity:.07; stroke-width:1.6; fill:none; vector-effect:non-scaling-stroke; }
      .edge2 { stroke:#9EC8FF; stroke-opacity:.05; stroke-width:1.2; fill:none; vector-effect:non-scaling-stroke; }
      .node { fill:#9EC8FF; fill-opacity:.06; }
      .node2 { fill:#9EC8FF; fill-opacity:.04; }
    </style>

    <pattern id="tile" patternUnits="userSpaceOnUse" width="240" height="240">
      <rect width="240" height="240" fill="none"/>

      <!-- base lattice edges -->
      <g class="edge">
        <path d="M20 40 L120 20 L220 40"/>
        <path d="M20 120 L120 100 L220 120"/>
        <path d="M20 200 L120 180 L220 200"/>

        <path d="M40 20 L20 120 L40 220"/>
        <path d="M120 20 L100 120 L120 220"/>
        <path d="M200 20 L220 120 L200 220"/>
      </g>

      <!-- diagonals (weak constraints / inference paths) -->
      <g class="edge2">
        <path d="M20 40 L100 120 L20 200"/>
        <path d="M220 40 L140 120 L220 200"/>
        <path d="M40 20 L120 100 L200 20"/>
        <path d="M40 220 L120 180 L200 220"/>
      </g>

      <!-- nodes -->
      <g>
        <circle class="node" cx="20" cy="40" r="3.2"/>
        <circle class="node" cx="120" cy="20" r="3.6"/>
        <circle class="node" cx="220" cy="40" r="3.2"/>

        <circle class="node" cx="20" cy="120" r="3.8"/>
        <circle class="node" cx="120" cy="100" r="4.2"/>
        <circle class="node" cx="220" cy="120" r="3.8"/>

        <circle class="node" cx="20" cy="200" r="3.2"/>
        <circle class="node" cx="120" cy="180" r="3.6"/>
        <circle class="node" cx="220" cy="200" r="3.2"/>

        <circle class="node2" cx="40" cy="20" r="2.6"/>
        <circle class="node2" cx="200" cy="20" r="2.6"/>
        <circle class="node2" cx="40" cy="220" r="2.6"/>
        <circle class="node2" cx="200" cy="220" r="2.6"/>
      </g>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#tile)"/>
</svg>
